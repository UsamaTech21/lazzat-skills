name: Sync Skills

on:
  push:
    branches: [main]
    paths:
      - 'CORE/skills/**'
      - 'CORE/SKILL.md'

permissions:
  contents: write

jobs:
  sync:
    name: Keep marketplace.json + VERSIONS.md in sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run sync script
        run: |
          if [ -f .github/scripts/sync-skills.js ]; then
            node .github/scripts/sync-skills.js
          else
            echo "sync-skills.js not present — skipping auto-sync, manual edit expected."
          fi

      - name: Commit and push updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .claude-plugin/marketplace.json VERSIONS.md README.md || true
            git commit -m "chore(skills): sync marketplace + versions [skip ci]" || true
            git push
          else
            echo "No sync changes needed."
          fi
